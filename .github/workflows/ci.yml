name: ci
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      TEST_REDIS_ADDR: "localhost:6379"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build Go packages
        run: make ci-backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend pipeline
        run: make ci-frontend
      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run govulncheck
        run: make ci-govulncheck

  integration:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - govulncheck
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build and boot full stack
        run: make ci-compose-up
      - name: Run compose smoke checks
        run: make ci-compose-smoke
      - name: Dump compose state on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color > compose-logs.txt
      - name: Upload compose logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose-logs.txt
          if-no-files-found: ignore
          retention-days: 7
      - name: Tear down stack
        if: always()
        run: make ci-compose-down
