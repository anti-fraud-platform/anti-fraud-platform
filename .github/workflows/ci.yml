name: ci
on:
  push:
    branches:
      - main
  pull_request:
      branches:
        - main
jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      TEST_REDIS_ADDR: "localhost:6379"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build Go packages
        run: go build ./...
      - name: Run Go tests
        run: go test $(go list ./... | grep -v frontend) -race -count=1
