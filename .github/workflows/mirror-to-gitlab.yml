name: Mirror To GitLab

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to GitLab
        env:
          GITLAB_MIRROR_USER: ${{ secrets.GITLAB_MIRROR_USER }}
          GITLAB_MIRROR_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
          GITLAB_REPO_URL: ${{ secrets.GITLAB_REPO_URL }}
        run: |
          git remote add gitlab-mirror "https://${GITLAB_MIRROR_USER}:${GITLAB_MIRROR_TOKEN}@${GITLAB_REPO_URL#https://}"
          git push gitlab-mirror main
