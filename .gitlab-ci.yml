deploy_vm:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p "${VM_PORT:-22}" "$VM_HOST" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - >
      ssh -p "${VM_PORT:-22}" "$VM_USER@$VM_HOST"
      "cd $DEPLOY_PATH &&
      git fetch origin &&
      git checkout main &&
      git pull --ff-only origin main &&
      docker compose up --build -d &&
      docker compose ps"
  only:
    - main