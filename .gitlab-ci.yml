stages:
  - test
  - build
  - integration
  - deploy

backend:
  stage: test
  image: golang:1.26-alpine
  services:
    - alias: postgres
      name: postgres:15
    - alias: redis
      name: redis:7-alpine
  variables:
    POSTGRES_USER: "antifraud"
    POSTGRES_PASSWORD: "antifraud123"
    POSTGRES_DB: "analytics"
    DB_HOST: "postgres"
    DB_PORT: "5432"
    DB_USER: "antifraud"
    DB_PASSWORD: "antifraud123"
    DB_NAME: "analytics"
    TEST_REDIS_ADDR: "redis:6379"
  before_script:
    - apk add --no-cache git
  script:
    - go mod tidy
    - git diff --exit-code -- go.mod go.sum
    - go run ./cmd/migrate up
    - go test ./...
    - go vet ./...

compose-config:
  stage: test
  image: docker:28
  script:
    - docker compose config > /tmp/compose-base.yaml
    - docker compose --profile monitoring config > /tmp/compose-monitoring.yaml
    - docker compose -f docker-compose.ci.yml config > /tmp/compose-ci.yaml

frontend:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  before_script:
    - cd frontend
    - npm ci --no-audit --no-fund --cache .npm --prefer-offline
  script:
    - npm run lint
    - npm run build
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - frontend/dist/

docker-build:
  stage: build
  image: docker:28
  services:
    - docker:28-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -f Dockerfile.engine -t antifraud-engine:ci .
    - docker build -f Dockerfile.analytics -t antifraud-analytics:ci .
    - docker build -f Dockerfile.nginx-engine -t antifraud-nginx-engine:ci .
    - docker build -f frontend/Dockerfile -t antifraud-frontend:ci .
  needs:
    - backend
    - frontend
    - compose-config

integration:
  stage: integration
  image: docker:28
  services:
    - docker:28-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    SMOKE_TRANSPORT: "compose_exec"
  before_script:
    - apk add --no-cache bash curl make python3
    - docker version
    - docker compose version
  script:
    - make ci-compose-up
    - make ci-compose-smoke
  after_script:
    - docker compose -f docker-compose.ci.yml ps > compose-ps.txt || true
    - docker compose -f docker-compose.ci.yml logs --no-color > compose-logs.txt || true
    - docker compose -f docker-compose.ci.yml down -v || true
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - compose-ps.txt
      - compose-logs.txt
  needs:
    - backend
    - frontend
    - compose-config
    - docker-build

deploy_vm:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p "${VM_PORT:-22}" "$VM_HOST" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - >
      ssh -p "${VM_PORT:-22}" "$VM_USER@$VM_HOST"
      "cd $DEPLOY_PATH &&
      git fetch origin &&
      git checkout main &&
      git pull --ff-only origin main &&
      export COMPOSE_PROFILES=monitoring &&
      docker compose up --build -d --remove-orphans &&
      docker compose restart nginx_engine &&
      docker compose ps &&
      bash scripts/deploy/vm_smoke.sh"
  needs:
    - backend
    - frontend
    - compose-config
    - docker-build
    - integration
  only:
    - main
