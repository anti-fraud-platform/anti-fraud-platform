stages:
  - test
  - security
  - integration
  - deploy

variables:
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go/pkg/mod"
  GOCACHE: "$CI_PROJECT_DIR/.cache/go/build"

backend:
  stage: test
  image: golang:1.26
  services:
    - alias: redis
      name: redis:7-alpine
  variables:
    TEST_REDIS_ADDR: "redis:6379"
  cache:
    key: go-cache
    paths:
      - .cache/go/pkg/mod/
      - .cache/go/build/
  script:
    - go build ./...
    - go test ./... -race -count=1

frontend:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  before_script:
    - cd frontend
    - npm ci --no-audit --no-fund --cache .npm --prefer-offline
  script:
    - npm run lint
    - npm run build
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - frontend/dist/

govulncheck:
  stage: security
  image: golang:1.26
  cache:
    key: go-cache
    paths:
      - .cache/go/pkg/mod/
      - .cache/go/build/
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - $(go env GOPATH)/bin/govulncheck ./...

integration:
  stage: integration
  image: docker:28
  variables:
    SMOKE_TRANSPORT: "compose_exec"
  before_script:
    - apk add --no-cache bash curl make python3
    - docker version
    - docker compose version
  script:
    - make ci-compose-up
    - make ci-compose-smoke
  after_script:
    - docker compose ps > compose-ps.txt || true
    - docker compose logs --no-color > compose-logs.txt || true
    - docker compose down -v || true
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - compose-ps.txt
      - compose-logs.txt
  needs:
    - backend
    - frontend
    - govulncheck

deploy_vm:
  stage: deploy
  image: alpine:3.20
  before_script:
    - sh scripts/deploy/gitlab_prepare_ssh.sh
  script:
    - sh scripts/deploy/gitlab_vm_deploy.sh
  needs:
    - integration
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
