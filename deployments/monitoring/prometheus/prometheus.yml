global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: engine
    metrics_path: /metrics
    static_configs:
      - targets:
          - engine:8080

  - job_name: analytics
    metrics_path: /metrics
    static_configs:
      - targets:
          - analytics:8081

  - job_name: node-exporter
    static_configs:
      - targets:
          - node_exporter:9100
