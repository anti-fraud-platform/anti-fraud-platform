server {
    listen 9090;
    server_name localhost;
    # Re-resolve the engine hostname through Docker DNS instead of caching a
    # container IP once at nginx startup. This prevents stale upstream
    # failures after `docker compose up --build` recreates only the engine
    # container.
    resolver 127.0.0.11 valid=1s ipv6=off;
    resolver_timeout 5s;
    set $engine_origin http://engine:8080;

    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location /health {
        proxy_pass $engine_origin/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /v1/challenge {
        proxy_pass $engine_origin/v1/challenge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /click {
        proxy_pass $engine_origin/v1/click;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /bot/click {
        proxy_pass $engine_origin/v1/click;
        proxy_method POST;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header User-Agent "python-requests/2.28 (automated testing signature)";
        proxy_set_header X-Click-Source "automated";
    }
}
