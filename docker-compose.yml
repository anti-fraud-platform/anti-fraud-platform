services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    container_name: antifraud-engine
    environment:
      PORT: "8080"
      ENGINE_PORT: "8080"
      ANALYTICS_URL: "http://analytics:8081"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: analytics
      DB_USER: antifraud
      DB_PASSWORD: antifraud123
      DB_MAX_OPEN_CONNS: "80"
      DB_MAX_IDLE_CONNS: "20"
      DB_BATCH_SIZE: "1000"
      DB_BATCH_FLUSH_MS: "500"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      BLACKLIST_PATH: /app/data/dirty_ips.txt
    ports:
      - "8080:8080"
    volumes:
      - ./deployments/blacklists/dirty_ips.txt:/app/data/dirty_ips.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - antifraud-net
    restart: unless-stopped

  analytics:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    container_name: antifraud-analytics
    environment:
      PORT: "8081"
      ANALYTICS_PORT: "8081"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: analytics
      DB_USER: antifraud
      DB_PASSWORD: antifraud123
      DB_MAX_OPEN_CONNS: "40"
      DB_MAX_IDLE_CONNS: "10"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - antifraud-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: antifraud-frontend
    environment:
      FRONTEND_PORT: "3000"
      ANALYTICS_BASE_URL: http://analytics:8081
      ENGINE_BASE_URL: http://engine:8080
    ports:
      - "3000:80"
    depends_on:
      - analytics
      - engine
    networks:
      - antifraud-net
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: antifraud-postgres
    environment:
      POSTGRES_USER: antifraud
      POSTGRES_PASSWORD: antifraud123
      POSTGRES_DB: analytics
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - wal_compression=on
    shm_size: "256mb"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deployments/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antifraud -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - antifraud-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: antifraud-redis
    environment:
      REDIS_PORT: "6379"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - antifraud-net
    restart: unless-stopped

volumes:
  pg_data:
    name: antifraud_pg_data

networks:
  antifraud-net:
    driver: bridge
