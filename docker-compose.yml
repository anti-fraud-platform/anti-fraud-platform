services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    container_name: antifraud-engine
    environment:
      PORT: "8080"
      ENGINE_PORT: "8080"
      ANALYTICS_URL: "http://analytics:8081"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: analytics
      DB_USER: antifraud
      DB_PASSWORD: antifraud123
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - antifraud-net
    restart: unless-stopped

  analytics:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    container_name: antifraud-analytics
    environment:
      PORT: "8081"
      ANALYTICS_PORT: "8081"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: analytics
      DB_USER: antifraud
      DB_PASSWORD: antifraud123
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - antifraud-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: antifraud-frontend
    environment:
      FRONTEND_PORT: "3000"
      ANALYTICS_BASE_URL: http://analytics:8081
      ENGINE_BASE_URL: http://engine:8080
    ports:
      - "3000:80"
    depends_on:
      - analytics
      - engine
    networks:
      - antifraud-net
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: antifraud-postgres
    environment:
      POSTGRES_USER: antifraud
      POSTGRES_PASSWORD: antifraud123
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deployments/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antifraud -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - antifraud-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: antifraud-redis
    environment:
      REDIS_PORT: "6379"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - antifraud-net
    restart: unless-stopped

volumes:
  pg_data:

networks:
  antifraud-net:
    driver: bridge
