services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    container_name: antifraud-engine
    ports:
      - "8080:8080"
    restart: unless-stopped

  analytics:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    container_name: antifraud-analytics
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: antifraud-frontend
    ports:
      - "3000:80"
    depends_on:
      - analytics
      - engine
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: antifraud-postgres
    environment:
      POSTGRES_USER: antifraud
      POSTGRES_PASSWORD: antifraud123
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deployments/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antifraud -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pg_data:
