services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    container_name: antifraud-engine
    environment:
      PORT: "8080"
      ENGINE_PORT: "8080"
      ANALYTICS_URL: "http://analytics:8081"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: analytics
      DB_USER: antifraud
      DB_PASSWORD: antifraud123
      DB_MAX_OPEN_CONNS: "80"
      DB_MAX_IDLE_CONNS: "20"
      DB_BATCH_SIZE: "1000"
      DB_BATCH_FLUSH_MS: "500"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GEOIP_DB_PATH: /usr/share/GeoIP/GeoLite2-Country.mmdb
      GEOIP_COUNTRY_DB_PATH: /usr/share/GeoIP/GeoLite2-Country.mmdb
      GEOIP_CITY_DB_PATH: /usr/share/GeoIP/GeoLite2-City.mmdb
      GEOIP_ASN_DB_PATH: /usr/share/GeoIP/GeoLite2-ASN.mmdb
      GEOIP_BLOCKED_ASN_KEYWORDS: "digitalocean,cloudflare,hetzner,ovh,linode,vultr,choopa,contabo,scaleway,oracle,amazon technologies,microsoft azure,google cloud"
      REQUIRE_JS_CHALLENGE: "true"
      REQUIRE_HEADER_CHECK: "true"
    volumes:
      - ./geoip:/usr/share/GeoIP:ro

    expose:
      - "8080"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - antifraud-net
    restart: unless-stopped

  nginx_engine:
    image: nginx:1.25-alpine
    container_name: antifraud-nginx-engine
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/nginx/engine.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deployments/nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - engine
    networks:
      - antifraud-net
    restart: unless-stopped

  analytics:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    container_name: antifraud-analytics
    environment:
      PORT: "8081"
      ANALYTICS_PORT: "8081"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: analytics
      DB_USER: antifraud
      DB_PASSWORD: antifraud123
      DB_MAX_OPEN_CONNS: "40"
      DB_MAX_IDLE_CONNS: "10"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REQUIRE_AUTH: "true"
      JWT_SECRET: "change-me-in-production"
      ADMIN_PASSWORD: "admin123"
    ports:
      - "8082:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - antifraud-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: antifraud-frontend
    environment:
      PORT: "80"
      FRONTEND_PORT: "3000"
      ANALYTICS_UPSTREAM: analytics:8081
      ENGINE_UPSTREAM: engine:8080
    ports:
      - "3001:80"
    depends_on:
      - analytics
      - engine
    networks:
      - antifraud-net
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: antifraud-postgres
    environment:
      POSTGRES_USER: antifraud
      POSTGRES_PASSWORD: antifraud123
      POSTGRES_DB: analytics
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - wal_compression=on
    shm_size: "256mb"
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deployments/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antifraud -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - antifraud-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: antifraud-redis
    environment:
      REDIS_PORT: "6379"
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - antifraud-net
    restart: unless-stopped

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v2.54.1
    container_name: antifraud-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./deployments/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - engine
      - analytics
      - node_exporter
    networks:
      - antifraud-net
    restart: unless-stopped

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.1.4
    container_name: antifraud-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployments/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - antifraud-net
    restart: unless-stopped

  node_exporter:
    profiles: ["monitoring"]
    image: prom/node-exporter:v1.8.2
    container_name: antifraud-node-exporter
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"
    networks:
      - antifraud-net
    restart: unless-stopped

volumes:
  pg_data:
    name: antifraud_pg_data
  prometheus_data:
    name: antifraud_prometheus_data
  grafana_data:
    name: antifraud_grafana_data

networks:
  antifraud-net:
    driver: bridge
